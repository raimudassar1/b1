<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>當代中文課程 · A Course in Contemporary Chinese</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
/* ─── RESET & ROOT ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #C0392B;
  --red-lt: #FDECEA;
  --ink:    #1a1a1a;
  --ink2:   #444;
  --ink3:   #888;
  --bg:     #FAF8F5;
  --bg2:    #F2EFE9;
  --bg3:    #E8E4DC;
  --white:  #FFFFFF;
  --border: rgba(0,0,0,0.10);
  --border2:rgba(0,0,0,0.18);
  --nav-h:  60px;
  --tab-h:  48px;
  --sans:   'DM Sans', system-ui, sans-serif;
  --serif:  'Noto Serif TC', serif;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 32px rgba(0,0,0,0.14);
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--ink); font-family: var(--sans); }

/* ─── LAYOUT ────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; }

/* ─── TOP NAV ───────────────────────────────────────────────── */
#top-nav {
  height: var(--nav-h);
  background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
  position: relative; z-index: 100; flex-shrink: 0;
}
#top-nav .logo { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--red); letter-spacing: -0.3px; flex-shrink: 0; }
#top-nav .logo span { font-size: 12px; color: var(--ink3); font-family: var(--sans); font-weight: 400; display: block; line-height: 1; margin-top: 1px; }
.nav-spacer { flex: 1; }
#lesson-select { font-family: var(--sans); font-size: 14px; border: 1px solid var(--border2); border-radius: 8px; padding: 6px 10px; background: var(--bg2); color: var(--ink); cursor: pointer; min-width: 160px; }

/* ─── TAB BAR ───────────────────────────────────────────────── */
#tab-bar {
  height: var(--tab-h);
  background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: stretch; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; flex-shrink: 0;
}
#tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; padding: 0 20px; font-family: var(--sans); font-size: 14px; font-weight: 500;
  color: var(--ink3); background: none; border: none; border-bottom: 2.5px solid transparent;
  cursor: pointer; transition: all 0.18s; display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.tab-btn:hover { color: var(--ink); background: var(--bg2); }
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
.tab-btn .tab-icon { font-size: 16px; }

/* ─── CONTENT AREA ──────────────────────────────────────────── */
#content { flex: 1; overflow: hidden; position: relative; }
.panel { position: absolute; inset: 0; display: none; overflow: hidden; }
.panel.active { display: flex; flex-direction: column; }

/* ─── BOOKS / PDF ───────────────────────────────────────────── */
#panel-books .book-switcher { display: flex; gap: 8px; padding: 12px 16px; background: var(--white); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.book-btn { flex: 1; padding: 10px; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.18s; border: 1.5px solid var(--border2); background: var(--bg2); color: var(--ink2); }
.book-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

.pdf-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
.pdf-toolbar button { font-family: var(--sans); font-size: 13px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border2); background: var(--white); color: var(--ink2); cursor: pointer; transition: all 0.15s; }
.pdf-toolbar button.active { background: var(--red); color: #fff; border-color: var(--red); }
.pdf-toolbar .page-info { font-size: 13px; color: var(--ink3); margin: 0 4px; }
.pdf-toolbar .spacer { flex: 1; }

#pdf-frame-wrap { flex: 1; overflow: hidden; position: relative; background: var(--bg3); }
#pdf-viewer { 
  width: 100%; height: 100%; overflow: auto; background: var(--bg3); 
  display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 20px 0;
  will-change: scroll-position; -webkit-overflow-scrolling: touch;
}
.pdf-page-wrapper {
  position: relative; background: #f8f8f8; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15); flex-shrink: 0;
}

/* ─── AUDIO ─────────────────────────────────────────────────── */
#panel-audio { flex-direction: row; }
.audio-sidebar { width: 260px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
@media (max-width: 700px) { #panel-audio { flex-direction: column; } .audio-sidebar { width: 100%; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); } }
.audio-sidebar-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; }
.audio-src-btn { flex: 1; font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 7px 6px; border-radius: 7px; border: 1.5px solid var(--border2); background: var(--bg2); color: var(--ink2); cursor: pointer; transition: all 0.15s; }
.audio-src-btn.active { background: var(--red); color: #fff; border-color: var(--red); }
.audio-lesson-list { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.audio-lesson-group { border-bottom: 1px solid var(--border); }
.audio-lesson-header { padding: 10px 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink3); background: var(--bg2); cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.audio-lesson-header.open .chevron { transform: rotate(90deg); }
.audio-track-list { display: none; }
.audio-lesson-header.open + .audio-track-list { display: block; }
.audio-track-item { padding: 9px 16px 9px 24px; font-size: 13px; color: var(--ink2); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.12s; }
.audio-track-item:hover { background: var(--bg2); }
.audio-track-item.playing { color: var(--red); font-weight: 500; background: var(--red-lt); }

.audio-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; gap: 24px; }
.audio-now-playing { text-align: center; }
.audio-now-playing .anp-lesson { font-size: 12px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
.audio-now-playing .anp-track { font-family: var(--serif); font-size: 22px; color: var(--ink); }

.audio-waveform { width: 100%; max-width: 480px; height: 60px; background: var(--bg2); border-radius: 10px; overflow: hidden; position: relative; }
.waveform-bar-wrap { display: flex; align-items: center; height: 100%; gap: 2px; padding: 8px 12px; }
.waveform-bar { flex: 1; border-radius: 2px; background: var(--bg3); transition: background 0.15s; }
.waveform-bar.played { background: var(--red); }
.audio-progress-wrap { width: 100%; max-width: 480px; }
.audio-progress { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: var(--bg3); border-radius: 4px; cursor: pointer; outline: none; }
.audio-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--red); margin-top: -6px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.audio-time { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink3); margin-top: 6px; font-variant-numeric: tabular-nums; }
.audio-controls { display: flex; align-items: center; gap: 16px; }
.audio-ctrl-btn { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--border2); background: var(--white); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink2); }
.audio-ctrl-btn.play-btn { width: 56px; height: 56px; font-size: 22px; background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 3px 12px rgba(192,57,43,0.3); }

/* ─── WHITEBOARD ─────────────────────────────────────────────── */
.wb-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--white); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.wb-btn { font-family: var(--sans); font-size: 13px; padding: 7px 12px; border-radius: 7px; border: 1px solid var(--border2); background: var(--bg2); color: var(--ink2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.wb-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform 0.12s; }
.color-swatch.active { border-color: var(--ink); }
#wb-canvas-wrap { flex: 1; overflow: hidden; position: relative; touch-action: none; }
#wb-canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

/* ─── TOAST & FOCUS ──────────────────────────────────────────── */
#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 999; transition: transform 0.3s ease; pointer-events: none; }
#toast.show { transform: translateX(-50%) translateY(0); }
body.focus-mode #top-nav { display: none; }
body.focus-mode #app { flex-direction: row; }
body.focus-mode #tab-bar { flex-direction: column; width: 64px; height: 100%; border-bottom: none; border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
body.focus-mode .tab-btn { padding: 16px 0; justify-content: center; border-bottom: none; border-left: 3px solid transparent; }
body.focus-mode .tab-btn.active { border-bottom-color: transparent; border-left-color: var(--red); }
body.focus-mode .tab-text { display: none; }

/* ─── LOADING SPINNER ───────────────────────────────────────── */
.spinner { width: 40px; height: 40px; border: 4px solid var(--bg3); border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) { #top-nav .logo span { display: none; } #lesson-select { min-width: 120px; font-size: 13px; } .tab-btn { padding: 0 14px; font-size: 13px; } }
</style>
</head>
<body>
<div id="app">
  <nav id="top-nav">
    <div class="logo">當代中文 <span>Contemporary Chinese — Book 1</span></div>
    <div class="nav-spacer"></div>
    <select id="lesson-select" onchange="jumpToLesson(this.value)"></select>
  </nav>

  <div id="tab-bar">
    <button class="tab-btn active" data-tab="books" onclick="switchTab('books')"><span class="tab-icon">📖</span> <span class="tab-text">Books</span></button>
    <button class="tab-btn" data-tab="audio" onclick="switchTab('audio')"><span class="tab-icon">🎧</span> <span class="tab-text">Audio</span></button>
    <button class="tab-btn" data-tab="whiteboard" onclick="switchTab('whiteboard')"><span class="tab-icon">✏️</span> <span class="tab-text">Whiteboard</span></button>
  </div>

  <div id="content">
    <div id="panel-books" class="panel active">
      <div class="book-switcher">
        <button class="book-btn active" id="btn-textbook" onclick="switchBook('textbook')">📚 Textbook</button>
        <button class="book-btn" id="btn-workbook" onclick="switchBook('workbook')">📓 Workbook</button>
      </div>
      <div class="pdf-toolbar">
        <select id="pdf-lesson-select" onchange="loadSplitPDF(this.value)" style="padding: 6px; border-radius: 6px; border: 1px solid var(--border2); font-family: var(--sans); font-size: 13px; min-width: 100px;"></select>
        <div class="spacer"></div>
        <button onclick="annotToggle()" id="annot-btn">✏️ Pen</button>
        <button onclick="setAnnotTool('eraser')" id="eraser-btn">🧽 Eras</button>
        <button onclick="setAnnotColor('red')" style="color:var(--red);">●</button>
        <button onclick="setAnnotColor('blue')" style="color:#1a73e8;">●</button>
        <button onclick="setAnnotColor('black')" style="color:#000;">●</button>
        <button onclick="clearAnnotations()" class="danger">🗑</button>
        <div class="spacer"></div>
        <button onclick="changeZoom(0.2)">➕</button>
        <button onclick="changeZoom(-0.2)">➖</button>
        <button onclick="toggleFocusMode()">⛶ Focus</button>
        <div class="spacer"></div>
        <div style="display: flex; align-items: center; gap: 4px; background: var(--bg3); padding: 2px 8px; border-radius: 8px; min-width: 220px;">
          <button onclick="togglePdfAudio()" id="pdf-play-pause-btn" style="border:none; background:none; padding: 4px; cursor:pointer;">▶</button>
          <input type="range" id="pdf-audio-progress" min="0" max="100" value="0" step="0.1" style="flex:1; height:4px; accent-color:var(--red); cursor:pointer;">
          <select id="pdf-audio-select" onchange="playAudioFromDropdown(this.value)" style="padding: 4px; border: none; background: transparent; font-family: var(--sans); font-size: 12px; max-width: 80px; cursor:pointer;">
            <option value="">— Audio —</option>
          </select>
        </div>
        <span class="page-info" id="pdf-page-info">1 / --</span>
      </div>
      <div id="pdf-frame-wrap"><div id="pdf-viewer"></div></div>
    </div>

    <div id="panel-audio" class="panel">
      <div class="audio-sidebar">
        <div class="audio-sidebar-head">
          <button class="audio-src-btn active" id="asrc-textbook" onclick="setAudioSource('textbook')">Textbook</button>
          <button class="audio-src-btn" id="asrc-workbook" onclick="setAudioSource('workbook')">Workbook</button>
        </div>
        <div class="audio-lesson-list" id="audio-lesson-list"></div>
      </div>
      <div class="audio-main">
        <div class="audio-now-playing"><div class="anp-lesson" id="anp-lesson">Select a track</div><div class="anp-track" id="anp-track">—</div></div>
        <div class="audio-waveform"><div class="waveform-bar-wrap" id="waveform-bars"></div></div>
        <div class="audio-progress-wrap">
          <input type="range" class="audio-progress" id="audio-progress" min="0" max="100" value="0" step="0.1">
          <div class="audio-time"><span id="audio-cur">0:00</span><span id="audio-dur">0:00</span></div>
        </div>
        <div class="audio-controls">
          <button class="audio-ctrl-btn" onclick="audioPrev()">⏮</button>
          <button class="audio-ctrl-btn play-btn" id="play-btn" onclick="audioPlayPause()">▶</button>
          <button class="audio-ctrl-btn" onclick="audioNext()">⏭</button>
        </div>
        <audio id="audio-player" preload="none"></audio>
      </div>
    </div>

    <div id="panel-whiteboard" class="panel">
      <div class="wb-toolbar">
        <button class="wb-btn active" id="wb-pen-btn" onclick="setWbTool('pen')">🖊 Pen</button>
        <button class="wb-btn" id="wb-hi-btn" onclick="setWbTool('highlight')">🔆 Highlight</button>
        <button class="wb-btn" id="wb-eraser-btn" onclick="setWbTool('eraser')">⬜ Eraser</button>
        <div class="wb-sep"></div>
        <div class="color-swatch active" style="background:#1a1a1a;" onclick="setWbColor('#1a1a1a')"></div>
        <div class="color-swatch" style="background:#C0392B;" onclick="setWbColor('#C0392B')"></div>
        <div class="color-swatch" style="background:#1a73e8;" onclick="setWbColor('#1a73e8')"></div>
        <div class="wb-sep"></div>
        <input type="range" id="wb-size-range" min="1" max="24" value="3" oninput="setWbSize(this.value)">
        <button class="wb-btn" onclick="wbUndo()">↩ Undo</button>
        <button class="wb-btn danger" onclick="wbClear()">🗑 Clear</button>
      </div>
      <div id="wb-canvas-wrap"><canvas id="wb-canvas"></canvas></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ─── CONFIG & STATE ──────────────────────────────────────────
let manifest = null;
let currentBook = 'textbook';
let currentLessonId = '01-A';
let audioSource = 'textbook';
let currentTrackIndex = -1;
let allTracks = [];

let wbTool = 'pen', wbColor = '#1a1a1a', wbSize = 3, wbStrokes = [], wbCurrentStroke = null, wbDrawing = false, wbCtx = null;

let pdfDoc = null, cachedPdfDocs = {}, pdfScale = 1.4;
let annotating = false, annotTool = 'pen', annotColor = 'red', annotStrokes = {}, annotDrawing = false, activeDrawingPage = null, annotLastX = 0, annotLastY = 0;
let renderedPages = new Set(), highResPages = new Set(), pageObserver = null, renderQueue = [], isRendering = false, pageImageCache = {};

const RENDER_DPI_ULTRA_LOW = 0.2; 
const RENDER_DPI_LOW = 1.0;       
const RENDER_DPI_HIGH = Math.max(window.devicePixelRatio, 2.2); 
const ANNOT_DPI = 2.0; 

// ─── INITIALIZATION ──────────────────────────────────────────
async function init() {
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  }
  try {
    const res = await fetch('manifest.json');
    manifest = res.ok ? await res.json() : getFallbackManifest();
  } catch(e) { manifest = getFallbackManifest(); }
  
  buildLessonSelect();
  buildAudioList();
  initWhiteboard();
  buildWaveformBars();
  loadSplitPDF('01-A');
}

function getFallbackManifest() {
  return {
    lessons: Array.from({length:15}, (_,i) => ({ id: i+1, title: `Lesson ${i+1}`, tracks: 10 })),
    workbookTracks: {1:5,2:5,3:5,4:5,5:5,6:6,7:6,8:6,9:6,10:6,11:5,12:5,13:5,14:5,15:5},
    tests: []
  };
}

// ─── NAVIGATION ──────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'whiteboard') setTimeout(resizeWbCanvas, 50);
}

function buildLessonSelect() {
  const topSel = document.getElementById('lesson-select');
  const panelSel = document.getElementById('pdf-lesson-select');
  const options = ['<option value="">— Jump to lesson —</option>'];
  manifest.lessons.forEach(l => {
    const paddedId = String(l.id).padStart(2, '0');
    options.push(`<option value="${paddedId}-A">L${paddedId}-1: ${l.title}</option>`);
    options.push(`<option value="${paddedId}-B">L${paddedId}-2: ${l.title}</option>`);
  });
  if (topSel) topSel.innerHTML = options.join('');
  if (panelSel) panelSel.innerHTML = options.join('');
}

function jumpToLesson(id) { if (id) loadSplitPDF(id); }

function switchBook(book) {
  if (currentBook === book) return;
  currentBook = book;
  document.querySelectorAll('.book-btn').forEach(b => b.classList.toggle('active', b.id.includes(book)));
  buildLessonSelect();
  loadSplitPDF(currentLessonId);
  updateAudioDropdown();
}

function changeZoom(delta) {
  pdfScale += delta;
  pdfScale = Math.min(Math.max(pdfScale, 0.5), 3.0);
  if (pdfDoc) {
    Object.values(pageImageCache).forEach(e => URL.revokeObjectURL(e.url));
    pageImageCache = {}; renderedPages.clear(); highResPages.clear();
    loadPDF(lastLoadedUrl);
  }
}
function toggleFocusMode() { document.body.classList.toggle('focus-mode'); }

// ─── PDF VIEWER (Triple-Pass & Eager Rendering) ───────────────────────
let lastLoadedUrl = '';
function loadSplitPDF(lessonIdWithPart) {
  if (!lessonIdWithPart) return;
  let lessonId, part;
  if (typeof lessonIdWithPart === 'string' && lessonIdWithPart.includes('-')) {
    [lessonId, part] = lessonIdWithPart.split('-');
  } else { lessonId = lessonIdWithPart; part = 'A'; }
  const paddedId = String(lessonId).padStart(2, '0');
  currentLessonId = paddedId + '-' + part;
  const selectEl = document.getElementById('pdf-lesson-select');
  if (selectEl) selectEl.value = lessonIdWithPart;

  const folder = currentBook === 'textbook' ? 'Textbook PDFs' : 'Workbook PDFs';
  const prefix = currentBook === 'textbook' ? 'Textbook_Lesson' : 'Workbook_Lesson';
  const url = `${folder}/${prefix}${paddedId}_${part}.pdf`;
  
  Object.values(pageImageCache).forEach(e => URL.revokeObjectURL(e.url));
  pageImageCache = {}; renderedPages.clear(); highResPages.clear();
  updateAudioDropdown();
  loadPDF(url);
}

async function loadPDF(url) {
  lastLoadedUrl = url;
  const viewer = document.getElementById('pdf-viewer');
  viewer.innerHTML = '<div style="display:flex; flex-direction:column; align-items:center; padding:100px 0;"><div class="spinner"></div><div style="color:var(--ink3)">Opening Document...</div></div>';
  renderQueue = []; if (pageObserver) pageObserver.disconnect();

  try {
    pdfDoc = cachedPdfDocs[url] || await pdfjsLib.getDocument(url).promise;
    cachedPdfDocs[url] = pdfDoc;
    document.getElementById('pdf-page-info').textContent = `1 / ${pdfDoc.numPages}`;
    viewer.innerHTML = ''; 
    const firstPage = await pdfDoc.getPage(1);
    const viewport = firstPage.getViewport({ scale: pdfScale });

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const pageWrapper = document.createElement('div');
      pageWrapper.className = 'pdf-page-wrapper';
      pageWrapper.id = `page-wrapper-${i}`;
      pageWrapper.dataset.pageNumber = i;
      pageWrapper.style.width = viewport.width + 'px';
      pageWrapper.style.height = viewport.height + 'px';
      pageWrapper.innerHTML = `<span style="color:#ccc; font-size:14px; position:relative; z-index:1;">Page ${i}</span>`;
      viewer.appendChild(pageWrapper);
    }
    setupPageObserver();
    // Pre-render first 4 pages
    for(let i=1; i<=Math.min(4, pdfDoc.numPages); i++) addToRenderQueue(i);
  } catch (e) { 
    console.error(e);
    viewer.innerHTML = `<div style="color:var(--red); padding: 40px;">Load Error</div>`; 
  }
}

function setupPageObserver() {
  const viewer = document.getElementById('pdf-viewer');
  pageObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const num = parseInt(entry.target.dataset.pageNumber);
      if (entry.isIntersecting) {
        document.getElementById('pdf-page-info').textContent = `Page ${num} / ${pdfDoc.numPages}`;
        if (pageImageCache[num]) showCachedImage(num); else addToRenderQueue(num);
      }
    });
  }, { root: viewer, threshold: 0, rootMargin: '600px' });
  document.querySelectorAll('.pdf-page-wrapper').forEach(p => pageObserver.observe(p));
}

function addToRenderQueue(num) {
  if (renderedPages.has(num) || renderQueue.includes(num)) return;
  renderQueue.push(num); processQueue();
}

async function processQueue() {
  if (isRendering || renderQueue.length === 0) return;
  isRendering = true;
  const num = renderQueue.shift();
  await renderToImage(num, RENDER_DPI_ULTRA_LOW, 0.1); 
  setTimeout(() => renderToImage(num, RENDER_DPI_LOW, 0.4), 50); 
  isRendering = false; setTimeout(processQueue, 0);
}

async function renderToImage(num, dpi, quality) {
  try {
    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale: pdfScale });
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    canvas.height = viewport.height * dpi; canvas.width = viewport.width * dpi;
    ctx.scale(dpi, dpi);
    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      if (pageImageCache[num] && dpi <= (pageImageCache[num].dpi || 0)) { URL.revokeObjectURL(url); return; }
      if (pageImageCache[num]) URL.revokeObjectURL(pageImageCache[num].url);
      pageImageCache[num] = { url, dpi };
      showCachedImage(num);
      canvas.width = 0; canvas.height = 0;
    }, 'image/jpeg', quality);
    renderedPages.add(num);
  } catch (e) { renderedPages.delete(num); }
}

async function enhancePage(num) {
  const pageWrapper = document.getElementById(`page-wrapper-${num}`);
  if (pageWrapper) { 
    const btn = pageWrapper.querySelector('.hd-btn'); 
    if (btn) { btn.textContent = '⌛...'; btn.disabled = true; }
    highResPages.add(num); await renderToImage(num, RENDER_DPI_HIGH, 0.95);
  }
}

function showCachedImage(num) {
  const pageWrapper = document.getElementById(`page-wrapper-${num}`);
  if (!pageWrapper || !pageImageCache[num]) return;

  const isHD = highResPages.has(num);
  const cacheEntry = pageImageCache[num];
  let img = pageWrapper.querySelector('.pdf-img');
  if (!img) {
    img = new Image(); img.className = 'pdf-img';
    img.style.cssText = 'width:100%; height:100%; display:block; position:absolute; inset:0;';
    pageWrapper.innerHTML = ''; pageWrapper.appendChild(img);
  }
  img.src = cacheEntry.url;

  let annotCanvas = pageWrapper.querySelector('.annot-canvas');
  if (!annotCanvas) {
    annotCanvas = document.createElement('canvas');
    annotCanvas.className = 'annot-canvas';
    annotCanvas.style.cssText = 'width:100%; height:100%; position:absolute; inset:0; touch-action:none;';
    annotCanvas.style.pointerEvents = annotating ? 'all' : 'none';
    annotCanvas.dataset.pageNumber = num;
    pageWrapper.appendChild(annotCanvas);
    annotCanvas.width = pageWrapper.offsetWidth * ANNOT_DPI;
    annotCanvas.height = pageWrapper.offsetHeight * ANNOT_DPI;
    const annotCtx = annotCanvas.getContext('2d');
    annotCtx.scale(ANNOT_DPI, ANNOT_DPI);
    annotCanvas.addEventListener('pointerdown', e => annotStart(e, num, annotCanvas));
    annotCanvas.addEventListener('pointermove', e => annotMove(e, num, annotCanvas));
    annotCanvas.addEventListener('pointerup', annotEnd);
    annotCanvas.addEventListener('pointercancel', annotEnd);
  }
  drawPageAnnotations(num, annotCanvas);

  if (!highResPages.has(num) && !pageWrapper.querySelector('.hd-btn')) {
    const hdBtn = document.createElement('button');
    hdBtn.className = 'hd-btn'; hdBtn.textContent = '✨ HD';
    hdBtn.onclick = (e) => { e.stopPropagation(); enhancePage(num); };
    hdBtn.style.cssText = 'position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.6); color:#fff; border:none; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; cursor:pointer; z-index:20; backdrop-filter:blur(4px);';
    pageWrapper.appendChild(hdBtn);
  } else if (highResPages.has(num)) {
    const btn = pageWrapper.querySelector('.hd-btn'); if (btn) btn.remove();
  }
}

// ─── ANNOTATION SYSTEM ────────────────────────────────────────
function annotToggle() {
  annotating = !annotating; annotTool = 'pen'; updateAnnotUI();
  document.querySelectorAll('.annot-canvas').forEach(c => c.style.pointerEvents = annotating ? 'all' : 'none');
  document.getElementById('pdf-viewer').style.overflow = annotating ? 'hidden' : 'auto'; 
  showToast(annotating ? 'Pen active' : 'Pen off');
}
function setAnnotTool(tool) { annotating = true; annotTool = tool; updateAnnotUI(); document.querySelectorAll('.annot-canvas').forEach(c => c.style.pointerEvents = 'all'); document.getElementById('pdf-viewer').style.overflow = 'hidden'; }
function updateAnnotUI() { document.getElementById('annot-btn').classList.toggle('active', annotating && annotTool === 'pen'); document.getElementById('eraser-btn').classList.toggle('active', annotating && annotTool === 'eraser'); }
function setAnnotColor(c) { annotating = true; annotTool = 'pen'; annotColor = c; updateAnnotUI(); }
function getAnnotPoint(e, canvas) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

function annotStart(e, pageNum, canvas) {
  if (!annotating || (e.pointerType !== 'pen' && e.pointerType !== 'mouse')) return;
  e.preventDefault(); annotDrawing = true; activeDrawingPage = pageNum;
  const pt = getAnnotPoint(e, canvas); annotLastX = pt.x; annotLastY = pt.y;
  if (!annotStrokes[pageNum]) annotStrokes[pageNum] = [];
  wbCurrentStroke = { tool: annotTool, color: annotColor, points: [pt] };
}
function annotMove(e, pageNum, canvas) {
  if (!annotating || !annotDrawing || activeDrawingPage !== pageNum) return;
  e.preventDefault(); const pt = getAnnotPoint(e, canvas); const ctx = canvas.getContext('2d');
  ctx.beginPath(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (annotTool === 'eraser') { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 25; }
  else { ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = annotColor === 'red' ? '#C0392B' : annotColor === 'blue' ? '#1A73E8' : '#000000'; ctx.lineWidth = 2.5; }
  ctx.moveTo(annotLastX, annotLastY); ctx.lineTo(pt.x, pt.y); ctx.stroke();
  annotLastX = pt.x; annotLastY = pt.y; if (wbCurrentStroke) wbCurrentStroke.points.push(pt);
}
function annotEnd() { if (annotDrawing) { if (wbCurrentStroke && activeDrawingPage !== null) annotStrokes[activeDrawingPage].push(wbCurrentStroke); annotDrawing = false; wbCurrentStroke = null; } }

function drawPageAnnotations(pageNum, canvas) {
  const strokes = annotStrokes[pageNum]; if (!strokes || strokes.length === 0) return;
  const ctx = canvas.getContext('2d');
  strokes.forEach(s => {
    if (s.points.length < 2) return; ctx.beginPath(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (s.tool === 'eraser') { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 25; }
    else { ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = s.color === 'red' ? '#C0392B' : s.color === 'blue' ? '#1A73E8' : '#000000'; ctx.lineWidth = 2.5; }
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
    ctx.stroke();
  });
  ctx.globalCompositeOperation = 'source-over';
}
function clearAnnotations() { if (confirm('Clear all in this book?')) { annotStrokes = {}; document.querySelectorAll('.annot-canvas').forEach(c => c.getContext('2d').clearRect(0,0,c.width,c.height)); } }

// ─── AUDIO CONTROLS ──────────────────────────────────────────
function getAudioPath(book, lessonId, trackId) {
  const folderBase = book === 'textbook' ? 'Audio Textbook' : 'Audio Workbook';
  const folderSuffix = parseInt(lessonId) <= 7 ? ' 1' : ' 2';
  return `${folderBase}${folderSuffix}/${trackId}.mp3`;
}
function togglePdfAudio() {
  const ap = document.getElementById('audio-player'), btn = document.getElementById('pdf-play-pause-btn');
  if (ap.paused) { if (!ap.src) return showToast('Select track'); ap.play().then(() => btn.textContent = '⏸'); }
  else { ap.pause(); btn.textContent = '▶'; }
}
function playAudioFromDropdown(src) { if (!src) return; const ap = document.getElementById('audio-player'); ap.src = src; ap.play().then(() => document.getElementById('pdf-play-pause-btn').textContent = '⏸'); }
function updateAudioDropdown() {
  const sel = document.getElementById('pdf-audio-select'); if (!sel) return;
  sel.innerHTML = '<option value="">— Audio —</option>';
  
  // Extract base lesson number from currentLessonId (handles '01-A' -> 1)
  const baseLessonNum = parseInt(currentLessonId.split('-')[0]);
  const lesson = manifest.lessons.find(l => l.id === baseLessonNum);
  if (!lesson) return;

  const count = currentBook === 'textbook' ? lesson.tracks : (manifest.workbookTracks[lesson.id] || 5);
  for (let t = 1; t <= count; t++) {
    const tid = String(lesson.id).padStart(2,'0') + '-' + (currentBook === 'textbook' ? String(t).padStart(2,'0') : t);
    const o = document.createElement('option');
    o.value = getAudioPath(currentBook, lesson.id, tid);
    o.textContent = `${currentBook === 'textbook' ? 'Trk' : 'WB'} ${t}`;
    sel.appendChild(o);
  }
}

// ─── WHITEBOARD, WAVEFORM, ETC ───────────────────────────────
function initWhiteboard() {
  const canvas = document.getElementById('wb-canvas'); if (!canvas) return; wbCtx = canvas.getContext('2d');
  resizeWbCanvas(); window.addEventListener('resize', resizeWbCanvas);
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); wbDrawing = true; const pt = getWbPoint(e); wbCurrentStroke = {tool: wbTool, color: wbColor, size: wbSize, points: [pt]}; });
  canvas.addEventListener('pointermove', e => { if (!wbDrawing) return; e.preventDefault(); const pt = getWbPoint(e); wbCurrentStroke.points.push(pt); wbCtx.beginPath(); const prev = wbCurrentStroke.points[wbCurrentStroke.points.length - 2]; wbCtx.strokeStyle = wbTool === 'eraser' ? '#fff' : wbColor; wbCtx.lineWidth = wbTool === 'eraser' ? wbSize * 5 : wbSize; wbCtx.lineCap = 'round'; wbCtx.moveTo(prev.x, prev.y); wbCtx.lineTo(pt.x, pt.y); wbCtx.stroke(); });
  canvas.addEventListener('pointerup', () => { if (wbDrawing) { wbStrokes.push(wbCurrentStroke); wbDrawing = false; } });
}
function resizeWbCanvas() { const canvas = document.getElementById('wb-canvas'), wrap = document.getElementById('wb-canvas-wrap'); if (!canvas || !wrap) return; canvas.width = wrap.offsetWidth; canvas.height = wrap.offsetHeight; redrawWhiteboard(); }
function redrawWhiteboard() { wbCtx.fillStyle = '#fff'; wbCtx.fillRect(0,0,wbCtx.canvas.width,wbCtx.canvas.height); wbStrokes.forEach(s => { wbCtx.beginPath(); wbCtx.strokeStyle = s.tool === 'eraser' ? '#fff' : s.color; wbCtx.lineWidth = s.tool === 'eraser' ? s.size * 5 : s.size; wbCtx.lineCap = 'round'; wbCtx.moveTo(s.points[0].x, s.points[0].y); s.points.slice(1).forEach(p => wbCtx.lineTo(p.x, p.y)); wbCtx.stroke(); }); }
function getWbPoint(e) { const r = document.getElementById('wb-canvas').getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
function setWbTool(t) { wbTool = t; document.querySelectorAll('.wb-btn').forEach(b => b.classList.toggle('active', b.id.includes(t.slice(0,2)))); }
function setWbColor(c) { wbColor = c; }
function setWbSize(v) { wbSize = parseInt(v); }
function wbUndo() { wbStrokes.pop(); redrawWhiteboard(); }
function wbClear() { if (confirm('Clear?')) { wbStrokes = []; redrawWhiteboard(); } }

function buildWaveformBars() { const wrap = document.getElementById('waveform-bars'); if (!wrap) return; wrap.innerHTML = ''; for (let i = 0; i < 40; i++) { const bar = document.createElement('div'); bar.className = 'waveform-bar'; bar.style.height = (20 + Math.random() * 60) + '%'; wrap.appendChild(bar); } }
function updateWaveform(pct) { const bars = document.querySelectorAll('.waveform-bar'), played = Math.round((pct / 100) * bars.length); bars.forEach((b, i) => b.classList.toggle('played', i < played)); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function fmtTime(s) { const m = Math.floor(s / 60); return `${m}:${String(Math.floor(s % 60)).padStart(2,'0')}`; }

function buildAudioList() {
  const list = document.getElementById('audio-lesson-list'); list.innerHTML = ''; allTracks = [];
  manifest.lessons.forEach(lesson => {
    const header = document.createElement('div'); header.className = 'audio-lesson-header';
    header.innerHTML = `<span>L${String(lesson.id).padStart(2,'0')} · ${lesson.title}</span><span class="chevron">›</span>`;
    const trackList = document.createElement('div'); trackList.className = 'audio-track-list';
    header.onclick = () => header.classList.toggle('open');
    const count = audioSource === 'textbook' ? lesson.tracks : (manifest.workbookTracks[lesson.id] || 5);
    for (let t = 1; t <= count; t++) {
      const tid = String(lesson.id).padStart(2,'0') + '-' + (audioSource === 'textbook' ? String(t).padStart(2,'0') : t);
      const src = getAudioPath(audioSource, lesson.id, tid); const idx = allTracks.length;
      allTracks.push({ src, label: `Track ${tid}`, lesson: lesson.id, lessonTitle: lesson.title });
      const item = document.createElement('div'); item.className = 'audio-track-item'; item.innerHTML = `<span class="track-num">${tid}</span><span>Track ${t}</span>`;
      item.onclick = () => playTrack(idx); trackList.appendChild(item);
    }
    list.appendChild(header); list.appendChild(trackList);
  });
}
function setAudioSource(src) { audioSource = src; document.getElementById('asrc-textbook').classList.toggle('active', src === 'textbook'); document.getElementById('asrc-workbook').classList.toggle('active', src === 'workbook'); buildAudioList(); }
function playTrack(idx) { currentTrackIndex = idx; const track = allTracks[idx], ap = document.getElementById('audio-player'); ap.src = track.src; ap.play().then(() => document.getElementById('play-btn').textContent = '⏸'); document.getElementById('anp-lesson').textContent = `Lesson ${track.lesson}`; document.getElementById('anp-track').textContent = track.label; }
function audioPlayPause() { const ap = document.getElementById('audio-player'); if (ap.paused) { if (currentTrackIndex === -1 && allTracks.length > 0) playTrack(0); else ap.play().then(() => document.getElementById('play-btn').textContent = '⏸'); } else { ap.pause(); document.getElementById('play-btn').textContent = '▶'; } }
function audioPrev() { if (currentTrackIndex > 0) playTrack(currentTrackIndex - 1); }
function audioNext() { if (currentTrackIndex < allTracks.length - 1) playTrack(currentTrackIndex + 1); }

document.addEventListener('DOMContentLoaded', () => {
  const ap = document.getElementById('audio-player');
  const progMain = document.getElementById('audio-progress');
  const progToolbar = document.getElementById('pdf-audio-progress');
  
  ap.addEventListener('timeupdate', () => {
    if (!ap.duration) return;
    const pct = (ap.currentTime / ap.duration) * 100;
    if (progMain) progMain.value = pct;
    if (progToolbar) progToolbar.value = pct;
    if (document.getElementById('audio-cur')) document.getElementById('audio-cur').textContent = fmtTime(ap.currentTime);
    updateWaveform(pct);
  });
  
  ap.addEventListener('durationchange', () => {
    if (document.getElementById('audio-dur')) document.getElementById('audio-dur').textContent = fmtTime(ap.duration);
  });
  
  ap.addEventListener('ended', () => {
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('pdf-play-pause-btn').textContent = '▶';
    audioNext();
  });
  
  const handleSeek = e => { if (ap.duration) ap.currentTime = (e.target.value / 100) * ap.duration; };
  if (progMain) progMain.addEventListener('input', handleSeek);
  if (progToolbar) progToolbar.addEventListener('input', handleSeek);
});

init();
</script>
